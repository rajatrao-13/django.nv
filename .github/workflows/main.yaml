\name: Django                                  # workflow name

on:
  push:                                       
    branches:                                 # similar to "only" in GitLab
      - main

jobs:
  build:
    runs-on: ubuntu-latest                    # similar to "image" in GitLab
    steps:
      - uses: actions/checkout@v2

      - name: Setup python
        uses: actions/setup-python@v2
        with:
          python-version: '3.6'

      - run: |
          pip3 install --upgrade virtualenv
          virtualenv env
          source env/bin/activate
          pip install -r requirements.txt
          python manage.py check

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v2

      - name: Setup python
        uses: actions/setup-python@v2
        with:
          python-version: '3.6'

      - run: |
          pip3 install --upgrade virtualenv
          virtualenv env
          source env/bin/activate
          pip install -r requirements.txt
          python manage.py test taskManager

  oast-snyk:
    runs-on: ubuntu-latest
    container:
      image: 'node:12.16.1-alpine3.9'
    needs: build
    steps:
      - uses: actions/checkout@v2

      - name: Install Snyk
      - run: |
         wget -O /usr/local/bin/snyk https://github.com/snyk/cli/releases/download/v1.984.0/snyk-linux
         chmod +x /usr/local/bin/snyk
         snyk auth ${{ secrets.SNYK_TOKEN }}
         export SNYK_TOKEN=${{ secrets.SNYK_TOKEN }}
         npm install 
         snyk test --json > output.json
        continue-on-error: true

      - uses: actions/upload-artifact@v2
        with:
          name: Snyk Report
          path: output.json
        if: always()                        # what is this for?         

  integration:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - run: echo "This is an integration step"
      - run: exit 1
        continue-on-error: true

  prod:
    runs-on: ubuntu-latest
    needs: integration
    steps:
      - run: echo "This is a deploy step."
